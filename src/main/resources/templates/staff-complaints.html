<!DOCTYPE html>
<html>
<head>
    <title>Staff Complaints</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .table-container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #17a2b8; /* staff color */
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="table-container">
    <h2>Assigned Complaints</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Description</th>
            <th>Status</th>
        </tr>

        <tr th:each="c : ${complaints}">
            <td th:text="${c.complaintId}"></td>
            <td th:text="${c.description}"></td>
            <td th:text="${c.status}"></td>
        </tr>
    </table>

    <a href="/staff-dashboard" class="back-btn">← Back</a>
</div>

</body>
</html>
